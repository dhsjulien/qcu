<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz CCP2 Mobile</title>
<style>
  :root {
    --primary: #2563eb;
    --success: #22c55e;
    --error: #ef4444;
    --bg: #f8fafc;
    --text: #1e293b;
  }

  body { 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    margin: 0;
    padding: 15px;
    background: var(--bg); 
    color: var(--text);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  h1 { 
    font-size: 1.5rem;
    text-align: center;
    color: var(--primary);
    margin-bottom: 10px;
  }

  /* Barre de progression */
  #progress-container {
    width: 100%;
    height: 8px;
    background: #e2e8f0;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width 0.3s ease;
  }

  #question-container { 
    background: #fff; 
    padding: 20px; 
    border-radius: 16px; 
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
    margin: 0 auto;
  }

  h2 { font-size: 1.1rem; margin-top: 0; line-height: 1.4; }

  .choice-btn { 
    display: block; 
    width: 100%; 
    margin: 12px 0; 
    padding: 16px; /* Plus grand pour le tactile */
    border: 2px solid #e2e8f0;
    border-radius: 12px; 
    cursor: pointer; 
    font-size: 15px; 
    text-align: left; 
    background: white;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .choice-btn:active { transform: scale(0.98); }

  .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
  .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }

  #next-btn { 
    width: 100%;
    margin-top: 15px; 
    padding: 16px; 
    border: none; 
    border-radius: 12px; 
    background-color: var(--primary); 
    color: white; 
    font-size: 16px; 
    font-weight: bold;
    box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4);
  }

  .score-final { text-align: center; font-size: 1.2rem; font-weight: bold; }
</style>
</head>
<body>
  <h1>Quiz Sécurité</h1>
  
  <div style="max-width: 500px; width: 100%; margin: 0 auto;">
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="question-container">
    </div>

  <script src="script.js"></script>
</body>
</html>
